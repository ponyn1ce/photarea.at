<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="alternate" hreflang="ru" href="https://photarea.com/ru/" />
    <link rel="alternate" hreflang="de" href="https://photarea.com/de/" />
    <link rel="alternate" hreflang="uk" href="https://photarea.com/ua/" />
    <link rel="alternate" hreflang="x-default" href="https://photarea.com/" />


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <script src="/js/lang.js"></script>

    <style>
      :root{
        --nav-bg: rgba(255,255,255,0.45);
        --nav-border: rgba(255,255,255,0.7);
        --accent-text: #0f2b3c;
        --link-muted: #6b8797;
        --button-bg: #111111;
        /* palette sampled from provided hero image */
        --bg1: #a4c8e9;
        --bg2: #eaf2f7;
        --bg3: #ffdcb8;
      }
      html,body{height:100%;}
      body{
        margin:0;
        font-family: 'Tan Nimbus', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helverica World', Arial;
        background: linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:0 20px; /* remove vertical padding to avoid extra scroll */
        overflow-x:hidden;
      }

      .panel{
        width: fit-content;
        background: linear-gradient(180deg, rgba(255,255,255,0.48), rgba(255,255,255,0.34));
        border: .3px solid var(--nav-border);
        border-radius: 60px;
        padding: 10px 20px;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-wrap:nowrap;
        gap:14px;
        box-shadow: 0 5px 22px rgba(19,55,85,0.06);
        backdrop-filter: blur(8px) saturate(110%);
        position: fixed;
        top: 21px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
      }

      .panel:before{
        content:"";
        position:absolute;
        inset:1px;
        border-radius:60px;
        pointer-events:none;
        /* симметричный внутренний блеск для эффекта прозрачности */
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), inset 0 -8px 18px rgba(12,35,50,0.03);
      }

      /* сдвинем логотип на ~10px влево относительно предыдущего положения */
      .logo{display:flex;align-items:center;gap:6px;flex:0 0 auto;text-decoration:none}
      .logo svg{width:26px;height:26px}
      .brand{color:var(--accent-text);font-weight:700;font-size:19px;letter-spacing:-0.01em;text-decoration:none;}

      /* вернуть горизонтальное расположение и центрировать меню */
      nav{flex:0 0 auto;display:flex;justify-content:center;}
      .nav-links{display:flex;align-items:center;gap:14px;}
      .nav-links a{color:var(--link-muted);text-decoration:none;font-weight:600;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:4px}
      .nav-links a:hover{color:var(--accent-text)}
      .nav-icon{display:none;width:20px;height:20px;object-fit: contain;}
      .nav-links a:hover .nav-icon{opacity: 0.8;}

      /* language trigger styling */
      .lang{position:relative;display:flex;align-items:center;margin: 0;}
      .lang-toggle{background:none;border:none;color:var(--link-muted);font-weight:600;font-size:14px;cursor:pointer;padding:6px 4px;display:flex;align-items:center;gap:8px}
      .lang-toggle:hover{color:var(--accent-text)}
      /* center dropdown under the toggle; increased width to fit labels when shown in toggle */
      .lang-menu{position:absolute;top:calc(100% + 17px);left:50%;transform:translateX(-50%);min-width:130px;
        /* полупрозрачный фон с блюром */
        background: rgba(255,255,255,0.32);
        backdrop-filter: blur(8px) saturate(110%);
        border-radius:10px;
        border:1px solid rgba(255,255,255,0.6);
        box-shadow:0 6px 18px rgba(12,35,50,0.06);
        /* уменьшил боковые отступы меню примерно в 2 раза */
        padding:6px 2px;display:none;flex-direction:column;z-index:3}
      .lang-menu.open{display:flex}
      /* компактные боковые отступы у пунктов: ~5-10px слева/справа */
      .lang-item{background:transparent;border:none;padding:8px 6px;text-align:center;cursor:pointer;font-weight:450;color:var(--accent-text);border-radius:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
      .lang-item .code{font-weight:700;color:var(--accent-text);min-width:auto;text-align:center}
      .lang-item .label{color:var(--link-muted);font-weight:450;text-align:center}
      .lang-item:hover{background:rgba(255,255,255,0.14)}
      .lang-item.selected{background:rgba(0,0,0,0.06)}

      /* сдвинем кнопку на ~10px вправо и увеличим радиус */
      .cta{flex:0 0 auto;}
      .cta .btn{
        background: var(--button-bg);
        color:#fff;
        padding:10px 30px;
        border-radius:34px; /* увеличено примерно в 2 раза */
        border: none;
        font-weight:600;
        font-size:14px;
        box-shadow: 0 6px 14px rgba(17,17,17,0.14), inset 0 -2px 4px rgba(255,255,255,0.03);
        cursor: pointer;
      }
      .cta .btn:active{transform:translateY(1px)}

      /* Burger menu styles - only for mobile */
      .burger-menu {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: transparent;
        backdrop-filter: blur(10px);
        z-index: 1000;
        padding: 80px 30px 30px;
        box-sizing: border-box;
        overflow-y: auto;
        transform: translateX(-100%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .burger-menu.active {
        transform: translateX(0);
      }

      .burger-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        font-size: 32px;
        color: #111;
        cursor: pointer;
        padding: 10px;
        line-height: 1;
      }

      .burger-nav {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .burger-nav a {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 18px 20px;
        background: #111;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .burger-nav a:active {
        transform: scale(0.98);
        opacity: 0.8;
      }

      .burger-nav img {
        width: 24px;
        height: 24px;
        filter: invert(1) brightness(2);
      }

      .burger-lang {
        margin-top: 20px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 12px;
      }

      .burger-lang-title {
        font-size: 14px;
        font-weight: 600;
        color: #666;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .burger-lang-items {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .burger-lang-item {
        background: #111;
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .burger-lang-item:active {
        transform: scale(0.95);
        opacity: 0.8;
      }

      .burger-lang-item.selected {
        background: #333;
      }

            .texthome{
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        font-size: 250px;
        font-weight: 800;
        color: #fff;
        opacity: 0.6;
        z-index: 1;
        filter: blur(1px);
        white-space: nowrap;
        user-select: none;
      }

      /* centered mascot and background text container */
      .hero-main {
        position: fixed;
        left: 50%;
        top: calc(50% + 10px);
        transform: translate(-50%, -50%);
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        width: 100%;
        height: auto;
      }

      @keyframes mascotFloat{
        0%{transform: translateY(0)}
        50%{transform: translateY(-30px)}
        100%{transform: translateY(0)}
      }

      .mascot{
        position: relative;
        max-width: 900px;
        width: auto;
        height: auto;
        z-index: 2;
        user-select: none;
        will-change: transform;
        animation: mascotFloat 3s ease-in-out infinite;
          margin-bottom: 50px; /* Подтягиваем нижний текст ближе к гифке */
      }



      /* hero copy under the mascot GIF */
      .hero-copy{
        position:fixed;
        left:50%;
        top:75%;
        transform:translateX(-50%);
        text-align:center;
        width:100%;
        max-width:900px;
        padding:0 20px;
        z-index:60;
        pointer-events:auto;
      }
      .hero-title{font-size:26px;margin:0;color:#0b1220;font-weight:700}
      .hero-sub{font-size:15px;margin:8px 0 0;color:rgba(18,50,68,0.6);max-width:720px;margin-left:auto;margin-right:auto}
      .hero-cta{margin-top:18px}
      /* уменьшена примерно на 1/3 от предыдущего большого размера */
      .hero-cta .btn{
        background:var(--button-bg);
        color:#fff;
        padding:14px 48px;
        border-radius:45px;
        border:0;
        font-weight:700;
        font-size:15px;
        box-shadow:0 8px 20px rgba(17,17,17,0.16);
      }
    
      

      /* Responsive spacing adjustments */
      @media (max-width:1200px){
        .panel{width: fit-content; max-width: 95%; padding: 8px 15px; border-radius: 40px; gap: 12px;}
        .panel:before{border-radius: 40px;}
        .brand{display:none;}
        .nav-links{gap: 12px;}
        .nav-links a span{font-size: 10px;}
        .cta .btn{padding: 8px 15px; font-size: 12px;}
        .texthome{font-size: 120px;}
        .mascot{max-width: 60vw;}
      }

      @media (max-width:720px){
        body {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          overflow: hidden;
          height: 100vh;
          padding: 0;
          margin: 0;
          position: relative;
        }
        
        /* Make logo clickable on mobile to open burger */
        .logo {
          cursor: pointer;
          z-index: 101;
        }
        
        .panel{
          padding: 11px 20px; 
          gap: 15px; 
          width: 90%; 
          min-width: auto; 
          max-width: 70%; 
          top: 15px; 
          border-radius: 50px;
        }
        .panel:before{border-radius: 50px;}
        .nav-links{gap: 15px}
        .nav-links a span{display:none;}
        .nav-icon{display:block; width: 28px; height: 28px;}
        .lang{margin: 0;}
        .lang-toggle{font-size: 16px;}
        .cta{display:none;}

        /* Flex container for Text and Mascot */
        .hero-main {
          position: relative;
          top: auto;
          left: auto;
          transform: none;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          margin-top: 65px; /* Space for header - reduced to show content higher */
          flex: 1; /* Take available space */
          pointer-events: none;
        }

        .texthome {
          position: relative;
          left: auto;
          top: auto;
          transform: none;
          font-size: 18vw;
          font-weight: 800;
          color: #fff;
          opacity: 0.6;
          z-index: 1;
          white-space: nowrap;
          user-select: none;
        }
        
        .mascot {
          position: relative;
          top: auto;
          left: auto;
          transform: none;
          max-width: 80vw;
          max-height: 35vh;
          margin: 0;
          animation: mascotFloatMobile 3s ease-in-out infinite;
        }
        
        @keyframes mascotFloatMobile {
          0%{transform: translateY(0)}
          50%{transform: translateY(-15px)}
          100%{transform: translateY(0)}
        }

        .hero-copy {
          position: relative;
          bottom: auto;
          top: auto;
          left: auto;
          transform: none;
          width: 100%;
          margin: -1px 0 0 0; /* Negative margin to bring content higher */
          z-index: 10;
          padding: 0 20px 120px 20px;
          box-sizing: border-box;
          text-align: center;
        }

        .hero-title{font-size: 24px; line-height: 1.2;}
        .hero-sub{font-size: 14px; line-height: 1.4; }
        .hero-sub br { display: none; }
        
        .hero-cta {
          width: 100%;
          display: flex;
          justify-content: center;
          margin-top: 20px;
        }
        .hero-cta .btn {
          width: 100%;
          font-size: 16px;
          padding: 16px 0;
          font-weight: 700;
          border-radius: 20px;
        }
      }

    </style>
  </head>

          <script>
        // Burger menu functionality - only for mobile
        (function(){
          const burger = document.getElementById('burgerMenu');
          const burgerClose = document.getElementById('burgerClose');
          const logo = document.querySelector('.logo');
          
          // Check user role and show admin button if needed
          async function checkAdminAccess() {
            const token = localStorage.getItem('token') || localStorage.getItem('auth_token');
            if (!token) return;
            
            try {
              const res = await fetch('/api/auth/me', { 
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
              });
              if (res.ok) {
                const data = await res.json();
                const u = data.user;
                const uLevel = Number(u.role_level || 0);
                
                // Show admin button for admins and managers
                if (u.role === 'admin' || u.role === 'manager' || uLevel >= 1) {
                  const adminNav = document.getElementById('burgerAdminNav');
                  if (adminNav) adminNav.style.display = 'flex';
                }
              }
            } catch (e) {
              console.log('Could not check admin access');
            }
          }
          
          checkAdminAccess();
          
          if(burger && logo && burgerClose) {
            // Open burger menu on logo click (mobile only)
            logo.addEventListener('click', function(e) {
              if(window.innerWidth <= 720) {
                e.preventDefault();
                burger.classList.add('active');
                document.body.style.overflow = 'hidden';
              }
            });
            
            // Close burger menu
            burgerClose.addEventListener('click', function() {
              burger.classList.remove('active');
              document.body.style.overflow = '';
            });
            
            // Close on outside click
            burger.addEventListener('click', function(e) {
              if(e.target === burger) {
                burger.classList.remove('active');
                document.body.style.overflow = '';
              }
            });
            
            // Handle burger language selection
            const burgerLangItems = document.querySelectorAll('.burger-lang-item');
            burgerLangItems.forEach(item => {
              item.addEventListener('click', function() {
                burgerLangItems.forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                const lang = this.dataset.lang;
                
                // Update main language toggle
                const toggle = document.querySelector('.lang-toggle');
                if(toggle) toggle.textContent = lang;
                
                // Update main language menu
                const langItems = document.querySelectorAll('.lang-item');
                langItems.forEach(i => {
                  i.classList.remove('selected');
                  if(i.dataset.lang === lang) {
                    i.classList.add('selected');
                  }
                });
                
                // Apply language change
                if(window.setSiteLanguage) window.setSiteLanguage(lang);
              });
            });
          }
        })();

        function handleStartClick(){
          const token = localStorage.getItem('auth_token');
          if(token){
            window.location.href = '/alt/album-guide.html';
          } else {
            alert('Пожалуйста, войдите в аккаунт, чтобы продолжить.');
            window.location.href = '/html/login.html';
          }
        }
        (function(){
          const toggle = document.querySelector('.lang-toggle');
          const menu = document.querySelector('.lang-menu');
          const items = Array.from(document.querySelectorAll('.lang-item'));
          if(!toggle || !menu) return;
          function close(){ menu.classList.remove('open'); toggle.setAttribute('aria-expanded','false'); }
          function open(){ menu.classList.add('open'); toggle.setAttribute('aria-expanded','true'); }

          // initialize toggle text from selected item
          const current = items.find(i=> i.classList.contains('selected')) || items[0];
          if(current){
            const code = current.dataset.lang || current.textContent.trim();
            // show only code in the top toggle
            toggle.textContent = code;
          }

          toggle.addEventListener('click', (e)=>{
            const isOpen = menu.classList.toggle('open');
            toggle.setAttribute('aria-expanded', isOpen);
          });

          items.forEach(i=> i.addEventListener('click', (e)=>{
            const lang = i.dataset.lang || i.textContent.trim();
            // update toggle to show code only
            toggle.textContent = lang;
            // mark selected
            items.forEach(x=> x.classList.remove('selected'));
            i.classList.add('selected');
            close();
            // Apply language change
            if(window.setSiteLanguage) window.setSiteLanguage(lang);
          }));

          document.addEventListener('click', (e)=>{
            if(!menu.contains(e.target) && !toggle.contains(e.target)) close();
          });
          document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') close(); });
        })();
