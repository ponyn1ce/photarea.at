<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/dynamic-bg-theme.css">
    <script src="../js/lang.js"></script>
    <script src="../js/password-toggle.js"></script>
    <script src="../js/dynamic-bg-theme.js"></script>
</head>
<body>
    

        <div class="wrapper">
            <form>
                
                <h1 data-i18n="reset_password_title">Новый пароль</h1>

                <div class="input-box">
                    <input 
                        data-i18n="new_password" 
                        type="password" 
                        placeholder="Новый пароль" 
                        required
                        id="newPassword"
                    > 
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <div class="input-box">
                    <input 
                        data-i18n="confirm_password" 
                        type="password" 
                        placeholder="Подтвердить пароль" 
                        required
                        id="confirmPassword"
                    > 
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <!-- Индикатор совпадения паролей -->
                <div id="passwordMatchIndicator" style="
                    margin-top: 15px;
                    padding: 10px;
                    border-radius: 8px;
                    font-size: 13px;
                    text-align: center;
                    display: none;
                    background: transparent;
                    border: 1px solid transparent;
                ">
                </div>

                <button type="submit" class="btn" data-i18n="reset_password_button" id="submitBtn">Установить пароль</button>

                <div class="register-link">
                    <a data-i18n="back_to_login" href="../html/login.html">← Вернуться ко входу</a> 
                </div>
            </form>
        </div>

        <script>
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const matchIndicator = document.getElementById('passwordMatchIndicator');
            const submitBtn = document.getElementById('submitBtn');

            /**
             * Проверяет совпадение паролей и показывает индикатор
             */
            function checkPasswordMatch() {
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Если оба поля заполнены
                if (newPassword && confirmPassword) {
                    matchIndicator.style.display = 'block';

                    if (newPassword === confirmPassword) {
                        // Пароли совпадают
                        matchIndicator.textContent = '✓ Пароли совпадают';
                        matchIndicator.style.borderColor = '#4ade80';
                        matchIndicator.style.backgroundColor = 'rgba(74, 222, 128, 0.1)';
                        matchIndicator.style.color = '#4ade80';
                        submitBtn.disabled = false;
                    } else {
                        // Пароли не совпадают
                        matchIndicator.textContent = '✗ Пароли не совпадают';
                        matchIndicator.style.borderColor = '#ef4444';
                        matchIndicator.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                        matchIndicator.style.color = '#ef4444';
                        submitBtn.disabled = true;
                    }
                } else {
                    matchIndicator.style.display = 'none';
                    submitBtn.disabled = false;
                }
            }

            // Слушаем изменения в полях пароля
            newPasswordInput.addEventListener('input', checkPasswordMatch);
            confirmPasswordInput.addEventListener('input', checkPasswordMatch);

            // Обработчик отправки формы
            document.querySelector('form').addEventListener('submit', (e) => {
                e.preventDefault();

                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Финальная проверка
                if (!newPassword || !confirmPassword) {
                    alert('Пожалуйста, заполните оба поля');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alert('Пароли не совпадают');
                    return;
                }

                if (newPassword.length < 6) {
                    alert('Пароль должен содержать минимум 6 символов');
                    return;
                }

                // Здесь добавить логику отправки нового пароля на сервер
                console.log('Новый пароль установлен:', newPassword);
                alert('Пароль успешно изменён! Перенаправление на вход...');
                // window.location.href = 'login.html';
            });
        </script>
</body>
</html>
