<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/dynamic-bg-theme.css">
    <script src="/js/lang.js"></script>
    <script src="/js/password-toggle.js"></script>
    <script src="/js/dynamic-bg-theme.js"></script>
</head>
<body>
    

        <div class="wrapper">
            <form>
                
                <h1 data-i18n="forgot_password_title" >Восстановление пароля</h1>

                <div class="input-box">
                    <input data-i18n="username_or_email" type="text" placeholder="Имя пользователя или Имейл" required> 
                    <i class='bx bxs-user'></i>
                </div>

                <button type="submit" class="btn" data-i18n="login_title" onclick="submitEmail(event)">Отправить код</button>

                <div class="register-link">
                    <p data-i18n="no-account">Нет аккаунта?</p>
                    <a data-i18n="zaregistration" href="registration.html"> Зарегистрироваться</a> 
                </div>
            </form>
        </div>

        <script>
            function submitEmail(event) {
                event.preventDefault();
                
                const emailInput = document.querySelector('input');
                const email = emailInput.value;

                if (!email) {
                    alert('Пожалуйста, введите имя пользователя или email');
                    return;
                }

                // Здесь добавить проверку на сервере
                // Если email существует, отправить код
                console.log('Отправка кода на:', email);
                
                // Перенаправление на страницу верификации кода
                window.location.href = 'forgot_password_verify_code.html';
            }
        </script>
</body>
</html>
