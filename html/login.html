<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/lang.js"></script>
</head>
<body>
    

        <div class="wrapper">
            <form>
                
                <h1 data-i18n="login_title" >Авторизоваться</h1>

                <div class="input-box">
                    <input data-i18n="username" type="text" placeholder="Никнейм" required> 
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input data-i18n="password" type="password" placeholder="Пароль" required> 
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox">
                        <p data-i18n="Remember-me">Запомнить меня</p>
                    </label>
                    <a data-i18n="forgot_password" href="#">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn" data-i18n="login_title">Авторизоваться</button>

                <div class="register-link">
                    <p data-i18n="no-account">Нет аккаунта?</p>
                    <a data-i18n="zaregistration" href="registration.html"> Зарегистрироваться</a> 
                </div>
            </form>
        </div>
</body>

</html>
