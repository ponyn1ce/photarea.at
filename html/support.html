<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#a4c8e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Support Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="/js/lang.js"></script>
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/support.js?v=20260125-1" defer></script>

    <style>
       :root{
        --nav-bg: rgba(255,255,255,0.45);
        --nav-border: rgba(255,255,255,0.7);
        --accent-text: #0f2b3c;
        --link-muted: #6b8797;
        --button-bg: #111111;
        /* palette sampled from provided hero image */
        --bg1: #a4c8e9;
        --bg2: #eaf2f7;
        --bg3: #ffdcb8;
      }
      a { text-decoration: none; }
      html,body{width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; /* Lock scroll for app feel */}
      *{box-sizing: border-box;}
      
      body{
        margin:0;
        font-family: 'Tan Nimbus', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helverica World', Arial;
        background: linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding: 110px 20px 24px; /* leave space for fixed header */
        overflow-x:hidden;
      }

      /* Desktop: center chat vertically in the remaining page area */
      @media (min-width: 901px){
        body{ align-items:center; }
      }

      /* --- HEADER STYLES (Copied from product.html) --- */
       .panel{
        width: fit-content;
        background: linear-gradient(180deg, rgba(255,255,255,0.48), rgba(255,255,255,0.34));
        border: .3px solid var(--nav-border);
        border-radius: 60px;
        padding: 10px 20px;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-wrap:nowrap;
        gap:14px;
        box-shadow: 0 5px 22px rgba(19,55,85,0.06);
        backdrop-filter: blur(8px) saturate(110%);
        position: fixed;
        top: 21px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
      }
        .panel:before{
        content:"";
        position:absolute;
        inset:1px;
        border-radius:60px;
        pointer-events:none;
        /* симметричный внутренний блеск для эффекта прозрачности */
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), inset 0 -8px 18px rgba(12,35,50,0.03);
      }
      /* сдвинем логотип на ~10px влево относительно предыдущего положения */
      .logo{display:flex;align-items:center;gap:6px;flex:0 0 auto;text-decoration:none}
      .logo svg{width:26px;height:26px}
      .brand{color:var(--accent-text);font-weight:700;font-size:19px;letter-spacing:-0.01em;text-decoration:none;}

      /* вернуть горизонтальное расположение и центрировать меню */
      nav{flex:0 0 auto;display:flex;justify-content:center;}
      .nav-links{display:flex;align-items:center;gap:14px;}
      .nav-links a{color:var(--link-muted);text-decoration:none;font-weight:600;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:4px}
      .nav-links a:hover{color:var(--accent-text)}
      .nav-icon{display:none;width:20px;height:20px;object-fit: contain;}
      .nav-links a:hover .nav-icon{opacity: 0.8;}

      /* language trigger styling */
      .lang{position:relative;display:flex;align-items:center;margin: 0;}
      .lang-toggle{background:none;border:none;color:var(--link-muted);font-weight:600;font-size:14px;cursor:pointer;padding:6px 4px;display:flex;align-items:center;gap:8px}
      .lang-toggle:hover{color:var(--accent-text)}
      /* center dropdown under the toggle; increased width to fit labels when shown in toggle */
      .lang-menu{position:absolute;top:calc(100% + 17px);left:50%;transform:translateX(-50%);min-width:130px;
        /* полупрозрачный фон с блюром */
        background: rgba(255,255,255,0.32);
        backdrop-filter: blur(8px) saturate(110%);
        border-radius:10px;
        border:1px solid rgba(255,255,255,0.6);
        box-shadow:0 6px 18px rgba(12,35,50,0.06);
        /* уменьшил боковые отступы меню примерно в 2 раза */
        padding:6px 2px;display:none;flex-direction:column;z-index:3}
      .lang-menu.open{display:flex}
      /* компактные боковые отступы у пунктов: ~5-10px слева/справа */
      .lang-item{background:transparent;border:none;padding:8px 6px;text-align:center;cursor:pointer;font-weight:450;color:var(--accent-text);border-radius:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
      .lang-item .code{font-weight:700;color:var(--accent-text);min-width:auto;text-align:center}
      .lang-item .label{color:var(--link-muted);font-weight:450;text-align:center}
      .lang-item:hover{background:rgba(255,255,255,0.14)}
      .lang-item.selected{background:rgba(0,0,0,0.06)}

      /* сдвинем кнопку на ~10px вправо и увеличим радиус */
      .cta{flex:0 0 auto;}
      .cta .btn{
        background: var(--button-bg);
        color:#fff;
        padding:10px 30px;
        border-radius:34px; /* увеличено примерно в 2 раза */
        border: none;
        font-weight:600;
        font-size:14px;
        box-shadow: 0 6px 14px rgba(17,17,17,0.14), inset 0 -2px 4px rgba(255,255,255,0.03);
        cursor: pointer;
      }
      .cta .btn:active{transform:translateY(1px)}

            .hero-cta .btn{
        background:var(--button-bg);
        color:#fff;
        padding:14px 48px;
        border-radius:45px;
        border:0;
        font-weight:700;
        font-size:15px;
        box-shadow:0 8px 20px rgba(17,17,17,0.16);
      }
    
      

      /* Responsive spacing adjustments */
      @media (max-width:1200px){
        .panel{width: fit-content; max-width: 95%; padding: 8px 15px; border-radius: 40px; gap: 12px;}
        .panel:before{border-radius: 40px;}
        .brand{display:none;}
        .nav-links{gap: 12px;}
        .nav-links a span{font-size: 10px;}
        .cta .btn{padding: 8px 15px; font-size: 12px;}
      }
      /* Make header compact earlier (tablets/phones) so it doesn't clash with chat UI */
      @media (max-width:900px){
        .panel{padding:10px 22px; gap: 16px; width: fit-content; min-width: 60%; max-width: 98%; border-radius: 50px;}
        .panel:before{border-radius: 50px;}
        .brand{display:none;}
        .nav-links{gap: 18px}
        .nav-links a span{display:none;}
        .nav-icon{display:block; width: 30px; height: 30px;}
        .lang{margin: 0;}
        .lang-toggle{font-size: 16px;}
        .cta{display:none;}
      }

      @media (max-width:720px){
        .panel{padding:11px 20px; gap: 18px; min-width: 70%;}
        .nav-links{gap: 16px}
        .nav-icon{width: 34px; height: 34px;}
        .lang-toggle{font-size: 18px;}
      }

      /* --- CHAT STYLES --- */
      .chat-wrapper {
          width: min(900px, 95vw);
          height: min(680px, calc(100vh - 160px));
          background: #fff;
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 5px 20px rgba(0,0,0,0.1);
          display: flex;
          /* Matches main site font stack from product.html */
          font-family: 'Tan Nimbus', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helverica World', Arial;
          letter-spacing: normal;
          text-rendering: optimizeLegibility;
      }

      @supports (height: 100dvh) {
        .chat-wrapper {
          height: min(680px, calc(100dvh - 160px));
        }
      }

      /* Mobile drawer controls */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 1100;
      }
      .sidebar-overlay.open { display: block; }

      .threads-burger {
        display: none;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 1px solid #eee;
        background: #fff;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
        color: #111;
      }
      
      .sidebar {
          width: 260px;
          background: #f8f9fa;
          border-right: 1px solid #eee;
          display: flex;
          flex-direction: column;
          /* Optional: keep sidebar titles in same font or use Poppins for contrast if desired based on design */
          font-family: inherit;
      }
      .sidebar-header {
          padding: 20px;
          font-weight: 700;
          font-size: 16px;
          border-bottom: 1px solid #eee;
          color: #333;
      }
      .thread-list {
          flex: 1;
          overflow-y: auto;
      }
      .thread-item {
          padding: 15px;
          border-bottom: 1px solid #f0f0f0;
          cursor: pointer;
          transition: background 0.2s;
      }
      .thread-item:hover { background: #eef2f5; }
      .thread-item.active { background: #fff; border-left: 4px solid #111; }
      .thread-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .thread-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      
      .sidebar-footer {
          padding: 15px;
          border-top: 1px solid #eee;
          display: flex;
          justify-content: center;
          background: #f8f9fa;
      }
      .new-chat-btn-circle {
          width: 45px; height: 45px;
          border-radius: 50%;
          background: #111;
          color: #fff;
          border: none;
          font-size: 24px;
          cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          box-shadow: 0 4px 10px rgba(0,0,0,0.15);
          transition: transform 0.2s;
      }
      .new-chat-btn-circle:hover { transform: scale(1.05); }

      /* Main Chat Area */
      .chat-main {
          flex: 1;
          display: flex;
          flex-direction: column;
          background: #fff;
      }
      .chat-header {
          padding: 15px 20px;
          border-bottom: 1px solid #eee;
          font-weight: 700;
          font-size: 16px;
          color: #111;
          display: flex;
          justify-content: space-between;
          align-items: center;
      }

      .order-info-bar {
        border-bottom: 1px solid #eee;
        background: #fff;
        padding: 12px 20px;
      }
      .order-info-bar-title {
        font-weight: 800;
        font-size: 12px;
        color: #111;
        margin-bottom: 6px;
      }
      .order-info-line {
        font-size: 12px;
        color: #444;
        line-height: 1.35;
      }
      .order-info-link {
        font-size: 12px;
        font-weight: 800;
        color: #111;
        text-decoration: underline;
      }
      .order-info-link:hover { opacity: 0.85; }

      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      #chatTitle {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #fafafa;
      }
      .msg {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.4;
        word-wrap: break-word;
        position: relative;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      
      .msg.user {
        align-self: flex-end;
        background: #111;
        color: #fff;
        border-bottom-right-radius: 2px;
      }
      .msg.agent {
        align-self: flex-start;
        background: #fff;
        border: 1px solid #eee;
        color: #111;
        border-bottom-left-radius: 2px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.03);
      }
      .msg-time { display: block; font-size: 10px; margin-top: 4px; opacity: 0.7; text-align: right; }
      
      /* Input Area */
      .input-area {
        padding: 20px;
        background: #fff;
        border-top: 1px solid #eee;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .file-btn {
        background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; color: #666;
      }
      .file-btn:hover { color: #111; }
      .message-input {
        flex: 1;
        padding: 15px 20px;
        border-radius: 30px;
        border: 1px solid #ddd;
        font-family: inherit;
        outline: none;
        resize: none;
        height: 60px;
        font-size: 16px;
        line-height: normal;
      }
      .message-input:focus { border-color: #111; }
      .send-btn {
        width: 60px; height: 60px; border-radius: 50%; border: none; background: #111; color: #fff;
        cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px;
      }

      /* Modal */
      .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
      .modal.open { display: flex; }
      .modal-content {
          background: #fff; width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
          animation: slideUp 0.3s ease;
      }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .modal h3 { margin-top: 0; margin-bottom: 20px; color: #111; }
      .radio-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
      .radio-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 15px; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
      .btn-cancel { padding: 8px 16px; border: 1px solid #ddd; background: transparent; border-radius: 6px; cursor: pointer; }
      .btn-confirm { padding: 8px 16px; background: #111; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
      
      select.form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; }

      .file-preview { margin-top: -10px; margin-bottom: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
      .file-remove { cursor: pointer; color: red; font-weight: bold; }
      
      .empty-state {
          display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999;
          text-align: center; padding: 20px;
      }

      /* --- MOBILE/TABLET CHAT LAYOUT --- */
      @media (max-width: 900px) {
        body {
          padding: 96px 10px 12px;
        }

        .chat-wrapper {
          width: 100%;
          max-width: 100%;
          border-radius: 16px;
          height: calc(100vh - 120px);
        }
        @supports (height: 100dvh) {
          .chat-wrapper { height: calc(100dvh - 120px); }
        }

        .threads-burger { display: inline-flex; }

        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          width: min(320px, 85vw);
          z-index: 1200;
          transform: translateX(-110%);
          transition: transform 0.2s ease;
          border-right: 1px solid #eee;
          box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }
        @supports (height: 100dvh) {
          .sidebar { height: 100dvh; }
        }
        .sidebar.open { transform: translateX(0); }

        .messages-area { padding: 12px; }
        .msg { max-width: 85%; }

        .input-area {
          padding: 12px;
          gap: 10px;
        }
        .message-input {
          height: 46px;
          padding: 10px 14px;
          font-size: 15px;
          border-radius: 22px;
        }
        .send-btn {
          width: 46px;
          height: 46px;
        }
      }
    </style>
</head>
<body>
   <header class="panel" role="banner" aria-label="Photarea navigation">
      <a class="logo" href="/index.html" aria-label="Photarea home">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#123244" />
          <path d="M2 17L12 22L22 17" stroke="#123244" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M2 12L12 17L22 12" stroke="#123244" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div class="brand">Photarea</div>
      </a>
      
        <!-- inline language trigger (looks like normal text) -->
        <div class="lang" aria-hidden="false">
          <button class="lang-toggle" aria-haspopup="true" aria-expanded="false" title="Select language">RU</button>
          <div class="lang-menu" role="menu" aria-label="Language menu">
            <button class="lang-item selected" role="menuitem" data-lang="EN" data-label="English"><span class="code">EN</span><span class="label">English</span></button>
            <button class="lang-item" role="menuitem" data-lang="DE" data-label="Deutsch"><span class="code">DE</span><span class="label">Deutsch</span></button>
            <button class="lang-item" role="menuitem" data-lang="RU" data-label="Русский"><span class="code">RU</span><span class="label">Русский</span></button>
            <button class="lang-item" role="menuitem" data-lang="UA" data-label="Українська"><span class="code">UA</span><span class="label">Українська</span></button>
          </div>
        </div>

      <nav>
        <div class="nav-links">
            <a href="/html/profile.html" data-protected>
              <img src="/icon/free-icon-font-user-3917711.png" class="nav-icon" alt="">
              <span data-i18n="nav_profile">Profile</span>
            </a>
            <a href="/html/faq.html">
              <img src="/icon/free-icon-font-lightbulb-question-10469137.png" class="nav-icon" alt="">
              <span data-i18n="nav_faq">FAQ</span>
            </a>
            <a href="/html/product.html">
              <img src="/icon/free-icon-font-sparkles-17511706.png" class="nav-icon" alt="">
              <span data-i18n="nav_products">products</span>
            </a>
            <a href="/html/support.html">
              <img src="/icon/free-icon-font-comments-5074207.png" class="nav-icon" alt="">
              <span data-i18n="nav_contact">Contact</span>
            </a>
        </div>
      </nav>

        <div class="cta">
          <button class="btn" data-i18n="top_cta" onclick="window.location.href='/html/album-guide.html'">Tap to create</button>
      </div>
    </header>


    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <!-- Main Chat UI -->
    <div class="chat-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">Ваши чаты</div>
            <div class="thread-list" id="threadList">
                <div style="padding: 20px; text-align: center; color: #999;">Загрузка...</div>
            </div>
            <div class="sidebar-footer">
                <button class="new-chat-btn-circle" id="openNewChatBtn" title="Новый чат">＋</button>
            </div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
            <div class="chat-header-left">
              <button class="threads-burger" id="threadsBurgerBtn" aria-label="Открыть список чатов">☰</button>
              <span id="chatTitle">Выберите чат</span>
            </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">Выберите чат слева или создайте новый</div>
            </div>
            
            <div class="file-preview" id="filePreview" style="display:none;">
                <span id="fileName">image.png</span>
                <span class="file-remove" id="fileRemove">✕</span>
            </div>
            
            <div class="input-area">
                <input type="file" id="fileInput" style="display:none;" multiple accept="image/*,.rar">
                <button class="file-btn" type="button" title="Прикрепить файл">📎</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                <button class="send-btn" id="sendBtn" type="button">➤</button>
            </div>
        </div>
    </div>

    <!-- New Chat Modal -->
    <div id="newChatModal" class="modal">
        <div class="modal-content">
            <h3>Создать новое обращение</h3>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="reason" value="1" checked>
                    Создать новый заказ
                </label>
                <label class="radio-label">
                    <input type="radio" name="reason" value="2">
                    Обсудить заказ
                </label>
            </div>
            
            <div id="orderSelectContainer" style="display:none; margin-bottom: 20px;">
                <label style="font-size:14px; font-weight:600; display:block; margin-bottom:5px;">Выберите заказ:</label>
                <select id="orderSelect" class="form-control">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="closeModalBtn">Отмена</button>
                <button class="btn-confirm" id="createChatBtn">Создать</button>
            </div>
        </div>
    </div>
    
    <audio id="notificationSound" preload="auto"></audio>

        <script>
        function handleStartClick(){
          const token = localStorage.getItem('token');
          if(token){
            window.location.href = '/alt/album-guide.html';
          } else {
            alert('Пожалуйста, войдите в аккаунт, чтобы продолжить.');
            window.location.href = '/html/login.html';
          }
        }
        (function(){
          const toggle = document.querySelector('.lang-toggle');
          const menu = document.querySelector('.lang-menu');
          const items = Array.from(document.querySelectorAll('.lang-item'));
          if(!toggle || !menu) return;
          function close(){ menu.classList.remove('open'); toggle.setAttribute('aria-expanded','false'); }
          function open(){ menu.classList.add('open'); toggle.setAttribute('aria-expanded','true'); }

          // initialize toggle text from selected item
          const current = items.find(i=> i.classList.contains('selected')) || items[0];
          if(current){
            const code = current.dataset.lang || current.textContent.trim();
            // show only code in the top toggle
            toggle.textContent = code;
          }

          toggle.addEventListener('click', (e)=>{
            const isOpen = menu.classList.toggle('open');
            toggle.setAttribute('aria-expanded', isOpen);
          });

          items.forEach(i=> i.addEventListener('click', (e)=>{
            const lang = i.dataset.lang || i.textContent.trim();
            // update toggle to show code only
            toggle.textContent = lang;
            // mark selected
            items.forEach(x=> x.classList.remove('selected'));
            i.classList.add('selected');
            close();
            // Apply language change
            if(window.setSiteLanguage) window.setSiteLanguage(lang);
          }));

          document.addEventListener('click', (e)=>{
            if(!menu.contains(e.target) && !toggle.contains(e.target)) close();
          });
          document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') close(); });
        })();
         
        (function(){
        async function updateStatus(){
          const el = document.getElementById('authStatus');
          if(!el) return;
          const token = localStorage.getItem('token');
          if(!token){ el.textContent = 'входа не было'; return; }
          try{
            const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
            if(res.ok){ el.textContent = 'вход подтвержден'; }
            else{ localStorage.removeItem('token'); el.textContent = 'входа не было'; }
          }catch(e){ el.textContent = 'входа не было'; }
        }
        if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', updateStatus);
        else updateStatus();
      })();
      </script>
