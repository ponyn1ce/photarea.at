<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Опрос — Photarea</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/survey.css">
</head>
<body>
  <div class="survey-overlay">
    <div class="survey-modal" role="dialog" aria-modal="true" aria-label="Опрос">
      <button class="survey-close" id="survey-close" aria-label="Закрыть">×</button>

      <div class="survey-body">
        <header class="survey-header">
          <h2 id="survey-title">Выберите, что вы хотите сделать</h2>
        </header>

        <main class="survey-steps">
          <!-- Step 1 -->
          <section class="survey-step" data-step="1">
            <div class="options-grid">
              <button class="option-card" data-value="warm-gift">
                <img src="/images/icons/emoji.png" alt="иконка" />
                <span>Подарить тёплые эмоции близким</span>
              </button>
              <button class="option-card" data-value="save-journey">
                <img src="/images/icons/palm.png" alt="иконка" />
                <span>Сохранить своё путешествие навсегда</span>
              </button>
              <button class="option-card" data-value="status-gift">
                <img src="/images/icons/trophy.png" alt="иконка" />
                <span>Сделать статусный подарок со смыслом</span>
              </button>
              <button class="option-card" data-value="attention-gift">
                <img src="/images/icons/mail.png" alt="иконка" />
                <span>Оказать небольшой знак внимания</span>
              </button>
              <button class="option-card" data-value="personal-keep">
                <img src="/images/icons/heart.png" alt="иконка" />
                <span>Сохранить любимые фото для себя</span>
              </button>
              <div class="option-placeholder"></div>
            </div>
          </section>

          <!-- Step 2 -->
          <section class="survey-step" data-step="2" hidden>
            <h3 class="step-question">Сколько фото вы бы хотели разместить в своей фотокниге?</h3>
            <div class="options-grid-2">
              <label class="radio-card"><input type="radio" name="count" value="up-to-50"> <span>до 50</span></label>
              <label class="radio-card"><input type="radio" name="count" value="50-100"> <span>50 - 100</span></label>
              <label class="radio-card"><input type="radio" name="count" value="100-150"> <span>100 - 150</span></label>
              <label class="radio-card"><input type="radio" name="count" value="150-plus"> <span>больше 150</span></label>
            </div>
          </section>

          <!-- Step 3 -->
          <section class="survey-step" data-step="3" hidden>
            <h3 class="step-question">Каких фото у вас больше?</h3>
            <div class="options-grid-2">
              <label class="radio-card"><input type="radio" name="orient" value="square"> <span>Квадратных</span></label>
              <label class="radio-card"><input type="radio" name="orient" value="landscape"> <span>Горизонтальных</span></label>
              <label class="radio-card"><input type="radio" name="orient" value="portrait"> <span>Вертикальных</span></label>
              <label class="radio-card"><input type="radio" name="orient" value="dont-know"> <span>Я не знаю</span></label>
            </div>
          </section>

          <!-- Step 4 (summary) -->
          <section class="survey-step" data-step="4" hidden>
            <h3 class="step-question">Готово</h3>
            <p>Спасибо! Мы можем предложить вам шаблоны и рекомендации на основе ответов. Нажмите «Завершить», чтобы увидеть результат.</p>
            <div class="summary" aria-live="polite"></div>
          </section>
        </main>

        <footer class="survey-footer">
          <div class="progress-wrap">
            <div class="progress-label">Готово: <span id="progress-percent">0%</span></div>
            <div class="progress-bar" aria-hidden>
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
          </div>

          <div class="actions">
            <button class="btn ghost" id="prev-btn" disabled>←</button>
            <div class="vertical-progress" id="vertical-progress">
              <div class="vertical-fill" id="vertical-fill" style="height:0%"></div>
            </div>
            <button class="btn primary" id="next-btn">Далее →</button>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <script src="../js/survey.js"></script>
</body>
</html>
