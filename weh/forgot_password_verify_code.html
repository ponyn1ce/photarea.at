<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/dynamic-bg-theme.css">
    <script src="../js/lang.js"></script>
    <script src="../js/password-toggle.js"></script>
    <script src="../js/dynamic-bg-theme.js"></script>
</head>
<body>
    

        <div class="wrapper">
            <form>
                
                <h1 data-i18n="verify_code_title">Введите код</h1>

                <p style="color: #fff; font-size: 14px; margin-bottom: 20px; text-align: center; opacity: 0.9;">
                    <span data-i18n="verify_code_description">Мы отправили код на вашу почту</span>
                </p>

                <div class="input-box">
                    <input 
                        data-i18n="verification_code" 
                        type="text" 
                        placeholder="Введите код из письма" 
                        required
                        maxlength="6"
                        pattern="[0-9]{6}"
                    > 
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <button type="submit" class="btn" data-i18n="verify_code_button" onclick="verifyCode(event)">Подтвердить код</button>

                <div class="register-link">
                    <p data-i18n="didnt_receive_code">Не получили код?</p>
                    <a data-i18n="resend_code" href="#" onclick="resendCode(event)"> Отправить еще раз</a> 
                </div>

                <div class="register-link">
                    <a data-i18n="back_to_login" href="../weh/login.html">← Вернуться ко входу</a> 
                </div>
            </form>
        </div>

        <script>
            function resendCode(event) {
                event.preventDefault();
                alert('Код отправлен повторно на вашу почту');
                // Здесь добавить логику отправки кода на сервер
            }

            function verifyCode(event) {
                event.preventDefault();

                const codeInput = document.querySelector('input');
                const code = codeInput.value;

                if (!code) {
                    alert('Пожалуйста, введите код из письма');
                    return;
                }

                if (!/^\d{6}$/.test(code)) {
                    alert('Код должен содержать 6 цифр');
                    return;
                }

                // Здесь добавить проверку кода на сервере
                console.log('Проверка кода:', code);
                
                // Перенаправление на страницу установки нового пароля
                window.location.href = 'forgot_password_reset.html';
            }
        </script>
</body>
</html>
